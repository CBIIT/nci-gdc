# Security headers
<IfModule mod_headers.c>
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
</IfModule>

# Drupal web root
DocumentRoot "/var/www/drupal/web"
<Directory "/var/www/drupal/web">
    Options Indexes FollowSymLinks
    AllowOverride ALL
    Require all granted
</Directory>
