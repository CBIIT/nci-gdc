name: GDC Foundation Sub-theme
description: "Custom sub-theme, inherits from the Foundation base theme."
type: theme
package: Custom
base theme: zurb_foundation
core_version_requirement: ^10 || ^9 || ^8

# Only attach your own libraries here.
libraries:
  - gdc_foundation/global
  - gdc_foundation/gdc_font
  - gdc_foundation/testfont

# Ensure your global library is appended right after Zurb’s global, everywhere it’s used.
libraries-extend:
  zurb_foundation/global:
    - gdc_foundation/global

# Optional: if some contrib libs inject styles you don't want, uncomment and tweak:
# libraries-override:
#   tb_megamenu/base:
#     css:
#       theme:
#         dist/styles.css: false

regions:
  meta_header: 'Meta header'
  header: Header
  search: 'Search'
  help: Help
  page_top: 'Page top'
  page_bottom: 'Page bottom'
  highlighted: Highlighted
  content: Content
  sidebar_first: 'Left sidebar'
  footer_first: 'Footer first column'
  footer_second: 'Footer second column'
  footer_third: 'Footer third column'
  footer_fourth: 'Footer fourth column'
  footer_bottom: 'Footer bottom (full width)'
  left_off_canvas: 'Left off canvas'
  right_off_canvas: 'Right off canvas'

regions_hidden:
  page_top: 'Page top'
  page_bottom: 'Page bottom'

features:
  - slogan
  - favicon
  - comment_user_picture
  - node_user_picture

